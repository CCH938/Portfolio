version: "3.9"

services:
  app:
    build: .
    container_name: cs-agent
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
    restart: unless-stopped
